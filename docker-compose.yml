version: '3.8'

services:
  minio:
    image: minio/minio:latest
    entrypoint: /bin/sh
    command: |
      -c "
      minio server /data --console-address ':9001' &
      for i in $$(seq 1 30); do
        mc alias set myminio http://localhost:9000 minioadmin minioadmin && break
        sleep 0.5
      done
      mc mb myminio/greengate || true
      mc anonymous set public myminio/greengate
      wait
      "
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 1s
      timeout: 5s
      retries: 30

  query-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "
      mkdir -p build_daemon &&
      cd build_daemon &&
      cmake .. -DCMAKE_BUILD_TYPE=Release &&
      make -j$(nproc) green_gate_daemon &&
      cd .. &&
      ./build_daemon/green_gate_daemon
      "
    volumes:
      - .:/workspace
    environment:
      - PORT=8080
      - CACHE_DIR=/tmp/greengate_cache
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=greengate
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock:
        soft: -1
        hard: -1
    depends_on:
      minio:
        condition: service_healthy

  benchmark-client:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "
      mkdir -p build_client &&
      cd build_client &&
      cmake .. -DCMAKE_BUILD_TYPE=Release &&
      make -j$(nproc) green_gate_benchmark &&
      cd .. &&
      ./build_client/green_gate_benchmark
      "
    volumes:
      - .:/workspace
    environment:
      - DAEMON_HOST=query-daemon
      - DAEMON_PORT=8080
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=greengate
    depends_on:
      query-daemon:
        condition: service_started
